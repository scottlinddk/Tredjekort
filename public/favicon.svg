<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    3. Limfjordsforbindelse mark: a dash-dot survey alignment (the planned
    motorway) crossing the Limfjord past the island Egholm, with amber
    interchanges north and south. Drawn in the app's survey/drafting palette.
  -->
  <defs>
    <clipPath id="card"><rect width="32" height="32" rx="6.5" /></clipPath>
    <style>
      .paper { fill: #fafaf8; }
      .fjord { fill: #0e7490; }
      .edge  { stroke: #d8d5cc; }
      @media (prefers-color-scheme: dark) {
        .paper { fill: #1b2530; }
        .fjord { fill: #2b8ba3; }
        .edge  { stroke: #3a414b; }
      }
    </style>
  </defs>
  <g clip-path="url(#card)">
    <rect class="paper" width="32" height="32" />
    <!-- Limfjord -->
    <rect class="fjord" y="13" width="32" height="9.5" fill-opacity="0.9" />
    <!-- Egholm -->
    <ellipse class="paper" cx="16" cy="17.75" rx="4.4" ry="1.7" fill-opacity="0.6" />
    <!-- planned motorway alignment, dash-dot -->
    <path d="M16 -2 V 34" fill="none" stroke="#1d4ed8" stroke-width="2.4"
      stroke-linecap="round" stroke-dasharray="5 2.4 0.1 2.4" />
    <!-- interchanges -->
    <circle cx="16" cy="7" r="2.7" fill="#a16207" stroke="#fafaf8" stroke-width="1.3" />
    <circle cx="16" cy="27.5" r="2.7" fill="#a16207" stroke="#fafaf8" stroke-width="1.3" />
  </g>
  <rect class="edge" x="0.65" y="0.65" width="30.7" height="30.7" rx="5.85" fill="none" />
</svg>
